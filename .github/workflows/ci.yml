name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libcurl4-openssl-dev clang

      - name: Configure
        run: cmake --preset debug-clang

      - name: Build
        run: cmake --build --preset debug-clang

      - name: Test
        run: ctest --preset debug-clang

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: clang-format --dry-run --Werror src/*.cpp src/*.hpp tests/*.cpp

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libcurl4-openssl-dev clang clang-tidy

      - name: Configure
        run: cmake --preset debug-clang

      - name: Run clang-tidy
        run: clang-tidy src/*.cpp -p build/debug
