name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libcurl4-openssl-dev libzip-dev clang

      - name: Configure
        run: cmake --preset debug-clang

      - name: Build
        run: cmake --build --preset debug-clang

      - name: Test
        run: ctest --preset debug-clang

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-format-22

      - name: Check formatting
        run: clang-format-22 --dry-run --Werror src/*.cpp src/*.hpp tests/*.cpp

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libcurl4-openssl-dev libzip-dev clang clang-tidy

      - name: Configure
        run: cmake --preset debug-clang

      - name: Run clang-tidy
        run: clang-tidy src/*.cpp -p build/debug
